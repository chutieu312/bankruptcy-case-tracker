name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: casetracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: casetracker_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-minimum-32-chars-long
          AWS_REGION: us-east-1
          AWS_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET: case-documents
          SQS_QUEUE_URL: http://localhost:4566/000000000000/case-notifications
        run: mvn verify -q

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend (Node 20 / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run type-check
        working-directory: ./frontend
        run: npm run tsc --if-present || npx tsc --noEmit

      - name: Run Vitest
        working-directory: ./frontend
        run: npm run test

  # ── Docker Build (main branch only) ─────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bct-api:latest,${{ secrets.DOCKERHUB_USERNAME }}/bct-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bct-frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/bct-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
