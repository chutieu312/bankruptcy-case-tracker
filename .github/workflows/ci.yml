name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: casetracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: casetracker_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-minimum-32-chars-long
          AWS_REGION: us-east-1
          AWS_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET: case-documents
          SQS_QUEUE_URL: http://localhost:4566/000000000000/case-notifications
        run: mvn verify -q

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend (Node 20 / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run type-check
        working-directory: ./frontend
        run: npm run tsc --if-present || npx tsc --noEmit

      - name: Run Vitest
        working-directory: ./frontend
        run: npm run test

  # ── Docker Build (main branch only) ─────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bct-api:latest,${{ secrets.DOCKERHUB_USERNAME }}/bct-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bct-frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/bct-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging (develop branch auto-deploys) ──────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://bct-api-staging.onrender.com
    steps:
      - name: Trigger Render staging deploy
        run: |
          # Render deploy hook — kicks off a new deploy of the latest image
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}")

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
          else
            echo "❌ Render deploy hook failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Wait for staging health check
        run: |
          echo "Waiting for Render to finish deploying..."
          # Render free tier can take 60-90s to spin up from cold start
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://bct-api-staging.onrender.com/api/actuator/health)
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Staging health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/18 — HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Staging did not become healthy after 3 minutes"
          exit 1

  # ── Deploy to Production (main branch, manual approval required) ─────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://bct.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/bankruptcy-case-tracker

            # Record current image tags for rollback
            PREV_API=$(docker inspect --format='{{index .RepoDigests 0}}' bct-api:latest 2>/dev/null || echo "none")
            PREV_FRONTEND=$(docker inspect --format='{{index .RepoDigests 0}}' bct-frontend:latest 2>/dev/null || echo "none")

            # Pull and deploy the new images
            docker compose pull api frontend
            docker compose up -d --no-deps api frontend

            # Health check with rollback on failure
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/api/actuator/health > /dev/null; then
                echo "✅ Production deploy successful (sha: ${{ github.sha }})"
                exit 0
              fi
              echo "Waiting for API... ($i/12)"
              sleep 5
            done

            echo "❌ Health check failed — rolling back to previous images"
            docker compose up -d --no-deps api frontend \
              --pull never
            exit 1

      - name: Tag release in GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "deploy-$(date +'%Y%m%d-%H%M%S')" \
            --title "Production deploy ${{ github.sha }}" \
            --notes "Deployed commit ${{ github.sha }} to production" \
            --target main
